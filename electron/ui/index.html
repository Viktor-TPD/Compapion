<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compapion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 420px;
      width: 320px;
      overflow: hidden;
      user-select: none;
    }

    header {
      background: #16213e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #0f3460;
    }

    header img#murloc {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 11px;
      color: #888;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #0f3460;
      font-size: 13px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.idle    { background: #aaa; }
    .dot.syncing { background: #f0c040; animation: pulse 1s infinite; }
    .dot.ok      { background: #4caf50; }
    .dot.error   { background: #e94560; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .last-sync {
      padding: 8px 16px 4px;
      font-size: 11px;
      color: #888;
    }

    .section {
      padding: 12px 16px 0;
    }

    .section label {
      font-size: 11px;
      color: #aaa;
      display: block;
      margin-bottom: 4px;
    }

    .path-row {
      display: flex;
      gap: 6px;
    }

    .path-row input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #1a4a80;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 5px 8px;
      font-size: 12px;
    }

    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    button:hover { background: #c73652; }
    button:active { transform: scale(0.97); }
    button.secondary {
      background: #0f3460;
      color: #e0e0e0;
    }
    button.secondary:hover { background: #1a4a80; }

    .actions {
      padding: 16px;
      display: flex;
      gap: 8px;
    }

    .error-msg {
      padding: 0 16px;
      font-size: 11px;
      color: #e94560;
      min-height: 16px;
    }

    footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 16px;
      font-size: 10px;
      color: #555;
      text-align: center;
      border-top: 1px solid #0f3460;
    }
  </style>
</head>
<body>

<header>
  <img id="murloc" src="murloc.png" onerror="this.style.display='none'" alt="" />
  <div>
    <h1>Compapion</h1>
    <p>Classic TBC Crafted-Gear Tracker</p>
  </div>
</header>

<div class="status-bar">
  <div class="dot idle" id="dot"></div>
  <span id="status-text">Idle</span>
</div>

<div class="last-sync" id="last-sync">Never synced</div>

<div class="section">
  <label>WoW Installation Directory</label>
  <div class="path-row">
    <input id="wow-dir" type="text" placeholder="C:\World of Warcraft" readonly />
    <button id="btn-browse" class="secondary">Browse</button>
  </div>
</div>

<div class="error-msg" id="error-msg"></div>

<div class="actions">
  <button id="btn-sync">Sync Now</button>
</div>

<footer>Data syncs on skill-up, gear change, boss kill, and logout.</footer>

<script>
  const api = window.compapion;

  const dot = document.getElementById('dot');
  const statusText = document.getElementById('status-text');
  const lastSync = document.getElementById('last-sync');
  const errorMsg = document.getElementById('error-msg');
  const wowDirInput = document.getElementById('wow-dir');

  const STATUS_LABELS = { idle: 'Idle', syncing: 'Syncing…', ok: 'Up to date', error: 'Error' };

  function applyState(state) {
    dot.className = 'dot ' + state.status;
    statusText.textContent = STATUS_LABELS[state.status] ?? state.status;
    if (state.lastSync) {
      const d = new Date(state.lastSync);
      const mins = Math.floor((Date.now() - d.getTime()) / 60000);
      lastSync.textContent = mins < 1 ? 'Last sync: just now' : `Last sync: ${mins}m ago`;
    }
    errorMsg.textContent = state.lastError ?? '';
  }

  function applyConfig(cfg) {
    wowDirInput.value = cfg.wowDir ?? '';
  }

  api.onState(applyState);
  api.onConfig(applyConfig);

  Promise.all([api.getState(), api.getConfig()]).then(([state, cfg]) => {
    applyState(state);
    applyConfig(cfg);
  });

  document.getElementById('btn-sync').addEventListener('click', async () => {
    statusText.textContent = 'Syncing…';
    await api.manualSync();
  });

  document.getElementById('btn-browse').addEventListener('click', async () => {
    const cfg = await api.pickWowDir();
    if (cfg) applyConfig(cfg);
  });
</script>
</body>
</html>
